<!DOCTYPE html>
<html>
<head>
  <title>Dick's Near You</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    /* General body styling */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #F4F6F5;
      color: #1C1C1C;
    }

    /* Sidebar */
    #sidebar {
      width: 300px;
      background: #006554; /* Dick's deep green */
      color: white;
      overflow-y: auto;
      padding: 20px;
      border-right: 3px solid #00463A;
    }

    #sidebar h2 {
      margin-top: 0;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-size: 18px;
    }

    /* Store cards */
    .store {
      padding: 12px;
      margin-bottom: 12px;
      background: white;
      color: #1C1C1C;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 5px solid #0A8754;
    }

    .store:hover {
      background: #E6F4F1;
      transform: translateY(-2px);
    }

    /* Map */
    #map {
      flex: 1;
    }

    .loading {
      font-size: 14px;
      color: #E0E0E0;
    }

    /* Leaflet popup styling */
    .leaflet-popup-content-wrapper {
      border-radius: 10px;
    }

    .leaflet-popup-content b {
      color: #006554;
    }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; height: 35%; }
      #map { height: 65%; }
    }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>🏈 Dick's Sporting Goods</h2>
  <div id="storeList" class="loading">Getting your location...</div>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371; // km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

if (navigator.geolocation) {

  navigator.geolocation.getCurrentPosition(async position => {

    const userLat = position.coords.latitude;
    const userLon = position.coords.longitude;

    const map = L.map('map').setView([userLat, userLon], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // User marker
    L.marker([userLat, userLon])
      .addTo(map)
      .bindPopup("You are here")
      .openPopup();

    document.getElementById("storeList").innerHTML = "Searching nearby stores...";

    // Overpass query
    const query = `
      [out:json];
      (
        node["name"="Dick's Sporting Goods"](around:50000,${userLat},${userLon});
        way["name"="Dick's Sporting Goods"](around:50000,${userLat},${userLon});
        relation["name"="Dick's Sporting Goods"](around:50000,${userLat},${userLon});
      );
      out center;
    `;

    const response = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "data=" + encodeURIComponent(query)
    });

    const data = await response.json();

    if (!data.elements.length) {
      document.getElementById("storeList").innerHTML =
        "No Dick's Sporting Goods found within 50km.";
      return;
    }

    const stores = data.elements.map(place => {
      const lat = place.lat || place.center.lat;
      const lon = place.lon || place.center.lon;
      const distance = calculateDistance(userLat, userLon, lat, lon);
      return { lat, lon, distance };
    });

    stores.sort((a, b) => a.distance - b.distance);

    const storeListDiv = document.getElementById("storeList");
    storeListDiv.innerHTML = "";

    // Green marker icon
    const greenIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    stores.forEach(store => {

      const marker = L.marker([store.lat, store.lon], { icon: greenIcon })
        .addTo(map)
        .bindPopup(
          `<b>Dick's Sporting Goods</b><br>${store.distance.toFixed(1)} km away`
        );

      const storeDiv = document.createElement("div");
      storeDiv.className = "store";
      storeDiv.innerHTML = `
        <strong>Dick's Sporting Goods</strong><br>
        ${store.distance.toFixed(1)} km away
      `;

      storeDiv.onclick = () => {
        map.setView([store.lat, store.lon], 14);
        marker.openPopup();
      };

      storeListDiv.appendChild(storeDiv);
    });

  }, () => {
    document.getElementById("storeList").innerHTML =
      "Location permission denied.";
  });

} else {
  document.getElementById("storeList").innerHTML =
    "Geolocation not supported by your browser.";
}
</script>

</body>
</html>
